services:
  flight-db:
    image: postgres:15
    environment:
      POSTGRES_DB: flight_db
      POSTGRES_USER: flight_user
      POSTGRES_PASSWORD: flight_pass
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_user -d flight_db"]
      interval: 5s
      retries: 5

  booking-db:
    image: postgres:15
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      retries: 5

  redis-master:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  redis-replica:
    image: redis:7-alpine
    depends_on:
      redis-master:
        condition: service_healthy
    command: ["redis-server", "--replicaof", "redis-master", "6379"]
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  redis-sentinel:
    image: redis:7-alpine
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    ports:
      - "26379:26379"
    command:
      - sh
      - -c
      - |
        cat > /tmp/sentinel.conf <<CONF
        port 26379
        bind 0.0.0.0
        sentinel resolve-hostnames yes
        sentinel announce-hostnames yes
        sentinel monitor mymaster redis-master 6379 1
        sentinel down-after-milliseconds mymaster 5000
        sentinel failover-timeout mymaster 10000
        sentinel parallel-syncs mymaster 1
        CONF
        exec redis-sentinel /tmp/sentinel.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      retries: 10

  flyway-flight:
    image: flyway/flyway:9
    command: -url=jdbc:postgresql://flight-db:5432/flight_db -user=flight_user -password=flight_pass -locations=filesystem:/flyway/sql migrate
    volumes:
      - ./flight-service/migrations:/flyway/sql
    depends_on:
      flight-db:
        condition: service_healthy

  flyway-booking:
    image: flyway/flyway:9
    command: -url=jdbc:postgresql://booking-db:5432/booking_db -user=booking_user -password=booking_pass -locations=filesystem:/flyway/sql migrate
    volumes:
      - ./booking-service/migrations:/flyway/sql
    depends_on:
      booking-db:
        condition: service_healthy

  flight-service:
    build: ./flight-service
    environment:
      DB_HOST: flight-db
      DB_PORT: 5432
      DB_NAME: flight_db
      DB_USER: flight_user
      DB_PASS: flight_pass
      GRPC_PORT: 50051
      INTERNAL_API_KEY: super-secret-key-2026
      REDIS_MODE: sentinel
      REDIS_MASTER_NAME: mymaster
      REDIS_SENTINEL_HOST: redis-sentinel
      REDIS_SENTINEL_PORT: 26379
    ports:
      - "50051:50051"
    depends_on:
      flyway-flight:
        condition: service_completed_successfully
      redis-sentinel:
        condition: service_healthy

  booking-service:
    build: ./booking-service
    environment:
      DB_HOST: booking-db
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: booking_user
      DB_PASS: booking_pass
      FLIGHT_SERVICE_HOST: flight-service
      FLIGHT_SERVICE_PORT: 50051
      INTERNAL_API_KEY: super-secret-key-2026
      CB_FAILURE_THRESHOLD: 5
      CB_RESET_TIMEOUT: 15
      CB_WINDOW_SIZE: 10
    ports:
      - "8000:8000"
    depends_on:
      flyway-booking:
        condition: service_completed_successfully
      flight-service:
        condition: service_started
